<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organigrama Subsecretaría</title>

  <style>
    :root{
      --bg:#2f3192;
      --white:#f3f3f3;
      --line:#ffffff;
      --cyan:#27c2ef;
      --text-dark:#2f3192;
      --shadow:0 10px 24px rgba(0,0,0,.16);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#e9eef5;
    }

    .page{
      width:100%;
      padding:18px;
    }

    .org-wrapper{
      max-width:1600px;
      margin:0 auto;
      background:var(--bg);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 12px 35px rgba(15,23,42,.15);
    }

    .org-header-bar{
      width:100%;
      height:18px;
      position:relative;
      background:var(--bg);
    }

    .org-header-bar::before,
    .org-header-bar::after{
      content:"";
      position:absolute;
      top:0;
      height:18px;
      width:165px;
    }

    .org-header-bar::before{
      left:50%;
      transform:translateX(-100%);
      background:#1fa7e4;
    }

    .org-header-bar::after{
      left:50%;
      background:#ef1838;
    }

    .board{
      position:relative;
      width:100%;
      aspect-ratio:1600 / 920;
      background:var(--bg);
    }

    .board svg.lines{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:1;
  shape-rendering:crispEdges;
}

.board svg.lines line{
  stroke:#ffffff;
  stroke-width:4;
  stroke-linecap:square;
  vector-effect:non-scaling-stroke;
}

    .section-title{
      position:absolute;
      z-index:3;
      color:#fff;
      font-weight:700;
      font-size:20px;
      line-height:1.1;
      text-align:center;
    }

    .node{
      position:absolute;
      z-index:4;
      border:none;
      cursor:pointer;
      transition:transform .18s ease, filter .18s ease;
      text-align:center;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      word-break:break-word;
      padding:8px 8px;
    }

    .node:hover{
      transform:translateY(-2px);
      filter:brightness(1.03);
    }

    .node.white{
      background:var(--white);
      color:var(--text-dark);
      box-shadow:var(--shadow);
      font-weight:700;
    }

    .node.cyan{
      background:var(--cyan);
      color:var(--text-dark);
      font-weight:400;
      box-shadow:none;
    }

    .node.big{
      font-size:18px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .node.main{
      font-size:12px;
      line-height:1.08;
    }

    .node.small{
      font-size:10px;
      line-height:1.06;
      padding:6px 6px;
    }

    .footer-band{
      background:#18b9e5;
      color:#2f3192;
      padding:16px 28px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      font-weight:800;
      font-size:24px;
      letter-spacing:.3px;
      position:relative;
    }

    .footer-center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:240px;
      height:22px;
    }

    .footer-center::before,
    .footer-center::after{
      content:"";
      position:absolute;
      top:0;
      width:120px;
      height:22px;
      border-radius:0 0 18px 18px;
    }

    .footer-center::before{
      left:0;
      background:linear-gradient(90deg, rgba(47,49,146,0) 0%, #24bde7 55%, #ffffff 75%, #ef1838 100%);
    }

    .footer-center::after{
      right:0;
      background:linear-gradient(90deg, #ffffff 0%, #ef1838 30%, #ef1838 70%, rgba(47,49,146,0) 100%);
      opacity:.85;
    }

    /* ===== MODAL ===== */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.38);
      display:none;
      z-index:9999;
    }

    .modal.show{
      display:block;
    }

    .modal-card{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      width:min(1100px, 95vw);
      max-height:88vh;
      background:#ffffff;
      border-radius:4px;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
      overflow:hidden;
    }

    .modal-header{
      background:#f3f3f3;
      border-bottom:1px solid #d8d8d8;
      padding:16px 22px;
      position:relative;
    }

    .modal-title{
      margin:0;
      font-size:22px;
      line-height:1.2;
      font-weight:700;
      color:#0f2747;
      padding-right:40px;
    }

    .modal-close{
      position:absolute;
      top:8px;
      right:12px;
      font-size:32px;
      line-height:1;
      border:none;
      background:none;
      cursor:pointer;
      color:#7a7a7a;
      padding:0;
      width:30px;
      height:30px;
    }

    .modal-body{
      padding:28px 36px 34px;
      font-size:15px;
      color:#2f2f2f;
      line-height:1.6;
      overflow:auto;
      max-height:calc(88vh - 72px);
    }

    .modal-body p{
      margin:0 0 14px 0;
    }

    .modal-body .persona{
      font-weight:700;
      color:#0f2747;
      margin-bottom:10px;
    }

    .modal-body .cargo{
      font-weight:700;
      color:#0f2747;
      margin-bottom:16px;
    }

    .modal-body .subtitulo{
      font-weight:700;
      text-decoration:underline;
      margin-top:10px;
      margin-bottom:8px;
    }

    .modal-body ol{
      margin:0;
      padding-left:20px;
    }

    .modal-body li{
      margin-bottom:6px;
    }

    @media (max-width: 900px){
      .org-wrapper{
        overflow-x:auto;
      }

      .board,
      .footer-band{
        min-width:1600px;
      }

      .modal-body{
        padding:22px;
        font-size:14px;
      }

      .modal-title{
        font-size:20px;
      }
    }
  </style>
</head>

  <!-- MODAL -->
  <div class="modal" id="infoModal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Título</h2>
        <button class="modal-close" id="closeModal" aria-label="Cerrar">×</button>
      </div>
      <div class="modal-body" id="modalText">
        Información del cargo.
      </div>
    </div>
  </div>

  <script>
    const nodes = document.querySelectorAll('.node');
    const modal = document.getElementById('infoModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const closeModal = document.getElementById('closeModal');

    nodes.forEach(node => {
      node.addEventListener('click', () => {
        modalTitle.textContent = node.dataset.title || '';
        modalText.innerHTML = node.dataset.info || '';
        modal.classList.add('show');
      });
    });

    function closeInfoModal() {
      modal.classList.remove('show');
    }

    closeModal.addEventListener('click', closeInfoModal);

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeInfoModal();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeInfoModal();
      }
    });
  </script>
