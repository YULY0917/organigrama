<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Organigrama Subsecretaría</title>

  <style>
    :root{
      --bg:#2f3192;
      --white:#f5f5f5;
      --line:#ffffff;
      --cyan:#22c7f4;
      --text-dark:#2f3192;
      --shadow:0 10px 24px rgba(0,0,0,.15);
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:#eef2f7;
    }

    .page{
      width:100%;
      padding:24px;
    }

    .org-wrapper{
      max-width:1600px;
      margin:0 auto;
      background:transparent;
      border-radius:16px;
      overflow:hidden;
      box-shadow:0 12px 35px rgba(15,23,42,.15);
    }

    .org-header-bar{
      width:100%;
      height:18px;
      position:relative;
      background:transparent;
    }

    .org-header-bar::before,
    .org-header-bar::after{
      content:"";
      position:absolute;
      top:0;
      height:18px;
      width:170px;
    }

    .org-header-bar::before{
      left:50%;
      transform:translateX(-100%);
      background:#1fa7e4;
    }

    .org-header-bar::after{
      left:50%;
      background:#ef1838;
    }

    .board{
      position:relative;
      width:100%;
      aspect-ratio:1600 / 920;
      background:url('assets/img/fondo.jpg') center/cover no-repeat;
    }

    .board svg.lines{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:1;
    }

    .section-title{
      position:absolute;
      z-index:3;
      color:#fff;
      font-weight:700;
      font-size:20px;
      line-height:1.1;
      text-align:center;
    }

    .node{
      position:absolute;
      z-index:4;
      border:none;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
      padding:8px 8px;
      text-align:center;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      word-break:break-word;
    }

    .node:hover{
      transform:translateY(-2px);
      filter:brightness(1.02);
    }

    .node.white{
      background:var(--white);
      color:var(--text-dark);
      box-shadow:var(--shadow);
      font-weight:700;
    }

    .node.cyan{
      background:var(--cyan);
      color:var(--text-dark);
      font-weight:400;
      box-shadow:none;
    }

    .node.big{
      font-size:18px;
      font-weight:800;
      letter-spacing:.2px;
    }

    .node.main{
      font-size:13px;
      line-height:1.1;
    }

    .node.small{
      font-size:10px;
      line-height:1.1;
      padding:6px 6px;
    }

    .footer-band{
      background:#16b9e5;
      color:#2f3192;
      padding:16px 28px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
      font-weight:800;
      font-size:26px;
      letter-spacing:.4px;
      position:relative;
    }

    .footer-center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:240px;
      height:22px;
    }

    .footer-center::before,
    .footer-center::after{
      content:"";
      position:absolute;
      top:0;
      width:120px;
      height:22px;
      border-radius:0 0 18px 18px;
    }

    .footer-center::before{
      left:0;
      background:linear-gradient(90deg, rgba(47,49,146,0) 0%, #24bde7 55%, #ffffff 75%, #ef1838 100%);
    }

    .footer-center::after{
      right:0;
      background:linear-gradient(90deg, #ffffff 0%, #ef1838 30%, #ef1838 70%, rgba(47,49,146,0) 100%);
      opacity:.85;
    }

    /* ===== MODAL ===== */
    .modal{
      position:fixed;
      inset:0;
      background:rgba(15,23,42,.55);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:20px;
    }

    .modal.show{
      display:flex;
    }

    .modal-card{
      width:min(640px, 92vw);
      background:#ffffff;
      border-radius:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.25);
      overflow:hidden;
      animation:pop .2s ease;
    }

    @keyframes pop{
      from{
        transform:scale(.96);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }

    .modal-header{
      background:#2f3192;
      color:#fff;
      padding:18px 22px 14px;
      position:relative;
    }

    .modal-type{
      display:inline-block;
      background:#22c7f4;
      color:#1d2675;
      font-size:12px;
      font-weight:700;
      padding:6px 10px;
      border-radius:999px;
      margin-bottom:10px;
    }

    .modal-title{
      margin:0;
      font-size:24px;
      line-height:1.2;
      padding-right:38px;
    }

    .modal-close{
      position:absolute;
      top:14px;
      right:14px;
      width:34px;
      height:34px;
      border:none;
      border-radius:50%;
      background:#ffffff;
      color:#2f3192;
      font-size:22px;
      cursor:pointer;
      line-height:1;
      font-weight:700;
    }

    .modal-body{
      padding:22px;
      color:#334155;
      font-size:16px;
      line-height:1.6;
    }

    @media (max-width: 900px){
      .org-wrapper{
        overflow-x:auto;
      }

      .board,
      .footer-band{
        min-width:1600px;
      }
    }
  </style>
</head>

          Unidad de<br>Infraestructura, Soporte<br>y Seguridad de la<br>Información
        </button>

        <button class="node cyan small" style="left:1405px; top:800px; width:135px; height:52px;"
          data-type="Unidad dependiente"
          data-title="Unidad de Administración de Tecnologías de la Información"
          data-info="Administra plataformas TI, continuidad operativa, configuración y soporte de servicios tecnológicos.">
          Unidad de<br>Administración de<br>Tecnologías de la<br>Información
        </button>

      </div>

      <div class="footer-band">
        <div>CHILE AVANZA CONTIGO</div>
        <div class="footer-center"></div>
        <div>GOBIERNO DE CHILE</div>
      </div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="infoModal">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-type" id="modalType">Cargo</span>
        <h2 class="modal-title" id="modalTitle">Título</h2>
        <button class="modal-close" id="closeModal" aria-label="Cerrar">×</button>
      </div>
      <div class="modal-body" id="modalText">
        Información del cargo.
      </div>
    </div>
  </div>

  <script>
    const nodes = document.querySelectorAll('.node');
    const modal = document.getElementById('infoModal');
    const modalType = document.getElementById('modalType');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    const closeModal = document.getElementById('closeModal');

    nodes.forEach(node => {
      node.addEventListener('click', () => {
        modalType.textContent = node.dataset.type || '';
        modalTitle.textContent = node.dataset.title || '';
        modalText.textContent = node.dataset.info || '';
        modal.classList.add('show');
      });
    });

    closeModal.addEventListener('click', () => {
      modal.classList.remove('show');
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.classList.remove('show');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        modal.classList.remove('show');
      }
    });
  </script>

</body>
</html>
